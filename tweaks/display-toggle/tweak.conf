# Tweak: display-toggle
# Auto-toggle eDP-2 on keyboard attach/detach (udev + systemd + kscreen-doctor)

TWEAK_NAME="display-toggle"
TWEAK_DESCRIPTION="Auto-toggle eDP-2 on keyboard attach/detach + boot-safe check"

TWEAK_INFO="Automatically toggles eDP-2 based on keyboard dock events:
  Keyboard attached → eDP-2 OFF
  Keyboard detached → eDP-2 ON
  Boot → checks keyboard presence, sets eDP-2 accordingly

Uses udev + systemd + kscreen-doctor.

At boot, a separate service detects whether the keyboard is
present and enables/disables eDP-2 automatically — no manual
plug/unplug needed. If login is delayed, the boot check retries
until the KDE/Wayland session, DBus socket, Wayland socket, and
KWin are ready before calling kscreen-doctor.
Detection treats only physically docked keyboard (USB 0b05:1cd7)
as attached; Bluetooth keyboard mode is treated as detached.

Startup reliability:
  - Serializes display changes with a runtime lock
  - Debounces duplicate same-action udev events for 30 seconds
  - Avoids calling kscreen-doctor before KDE/Wayland is ready

Validate:
  sudo systemctl start zenbook-duo-display-toggle@detach.service
  sudo systemctl start zenbook-duo-display-toggle@attach.service
  sudo systemctl start zenbook-duo-display-boot-check.service
  journalctl -t zenbook-duo-display-toggle -n 50 --no-pager

If your keyboard IDs differ, edit the udev rules file.
Find your values with:
  sudo udevadm monitor --udev --subsystem-match=input"

# Files: "source_filename:dest_absolute_path:permissions"
TWEAK_FILES=(
	"zenbook-duo-display-toggle.sh:/usr/local/bin/zenbook-duo-display-toggle.sh:755"
	"zenbook-duo-display-toggle@.service:/etc/systemd/system/zenbook-duo-display-toggle@.service:644"
	"zenbook-duo-display-boot-check.service:/etc/systemd/system/zenbook-duo-display-boot-check.service:644"
	"99-zenbook-duo-keyboard-display.rules:/etc/udev/rules.d/99-zenbook-duo-keyboard-display.rules:644"
)

tweak_post_install()
{
	systemctl daemon-reload
	udevadm control --reload-rules
	systemctl enable zenbook-duo-display-boot-check.service
	echo "  Reloaded systemd and udev rules."
	echo "  Enabled boot-time display check."
}

tweak_post_uninstall()
{
	systemctl disable zenbook-duo-display-boot-check.service 2>/dev/null || true
	systemctl daemon-reload
	udevadm control --reload-rules
	echo "  Disabled boot-time display check."
	echo "  Reloaded systemd and udev rules."
}
