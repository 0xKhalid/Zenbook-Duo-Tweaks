# Tweak: touchpad-fix
# Disable-while-typing for the detachable keyboard touchpad

TWEAK_NAME="touchpad-fix"
TWEAK_DESCRIPTION="Disable-while-typing for detachable keyboard touchpad"

TWEAK_INFO="Fixes cursor jumping while typing on the detachable keyboard.

The ASUS Zenbook Duo's Bluetooth keyboard has a built-in touchpad,
but libinput does not know they are one combo device. Without this
tweak, 'disable while typing' never engages — so accidental palm
or brush touches move the cursor mid-sentence.

This installs a libinput quirks file that marks the keyboard and
touchpad as a combo. The effect:
  - Proper 'disable while typing' behavior
  - Better palm/brush rejection
  - Cursor stops jumping while typing

Requires logout or reboot after install/uninstall.

Optional: install libinput-utils to verify quirks:
  sudo dnf install libinput-utils
  sudo libinput quirks list /dev/input/event<N>"

# Files: "source_filename:dest_absolute_path:permissions"
TWEAK_FILES=(
	"local-overrides.quirks:/etc/libinput/local-overrides.quirks:644"
)

tweak_post_install()
{
	echo "  Quirks installed. Log out or reboot to apply."
}

tweak_post_uninstall()
{
	echo "  Quirks removed. Reboot to apply."
}
