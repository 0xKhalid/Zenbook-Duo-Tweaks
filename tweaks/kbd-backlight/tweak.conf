# Tweak: kbd-backlight
# ASUS keyboard backlight control via HID (levels 0-3, requires python3)

TWEAK_NAME="kbd-backlight"
TWEAK_DESCRIPTION="ASUS keyboard backlight control (levels 0-3)"

TWEAK_INFO="Controls ASUS keyboard backlight via HID feature reports.
Supports USB (0B05:1CD7) and Bluetooth (0B05:1CD8).
Brightness levels 0-3. Requires python3.

After install:
  kbd-backlight             # cycle: off → low → med → high → off
  kbd-backlight set 3       # set specific level (0-3)
  kbd-backlight get         # show current level

KDE shortcut:
  System Settings → Shortcuts → Add New → Command/Script
  Trigger: F4, Command: kbd-backlight

Your user must be in the 'input' group for access without sudo.
Reconnect keyboard after install for udev rule to take effect."

# Files: "source_filename:dest_absolute_path:permissions"
TWEAK_FILES=(
	"kbd-backlight.sh:/usr/local/bin/kbd-backlight:755"
	"99-asus-kbd-backlight.rules:/etc/udev/rules.d/99-asus-kbd-backlight.rules:644"
)

tweak_pre_install()
{
	if ! command -v python3 >/dev/null 2>&1; then
		echo "  WARNING: python3 not found. kbd-backlight requires python3 for HID ioctl."
	fi
}

tweak_post_install()
{
	udevadm control --reload-rules
	echo "  Reloaded udev rules."

	local target_user="${SUDO_USER:-}"
	if [[ -n "$target_user" ]] && ! id -nG "$target_user" 2>/dev/null | grep -qw input; then
		usermod -aG input "$target_user"
		echo "  Added ${target_user} to 'input' group (log out and back in to apply)."
	fi

	echo "  Reconnect keyboard for new permissions to take effect."
}

tweak_post_uninstall()
{
	udevadm control --reload-rules
	echo "  Reloaded udev rules."
}
