# Tweak: speaker-fix
# Enable the laptop speaker on sof-soundwire (ALSA 'Speaker Switch')

TWEAK_NAME="speaker-fix"
TWEAK_DESCRIPTION="Enable laptop speaker (sof-soundwire Speaker Switch)"

TWEAK_INFO="Fixes silent speakers on the Zenbook Duo UX8407AA.

The CS42L43/CS35L56 audio codec UCM profile does not enable
the ALSA 'Speaker Switch' control, so it defaults to OFF on
every boot — making the laptop speakers completely silent.

This tweak installs a small systemd service that enables the
switch at boot time.

Manual test (no install needed):
  amixer -c 0 cset name='Speaker Switch' on
  speaker-test -D hw:0,2 -c 2 -t wav -l 1

Validate after install:
  amixer -c 0 cget name='Speaker Switch'
  systemctl status zenbook-duo-speaker-fix.service"

# Files: "source_filename:dest_absolute_path:permissions"
TWEAK_FILES=(
	"zenbook-duo-speaker-fix.sh:/usr/local/bin/zenbook-duo-speaker-fix.sh:755"
	"zenbook-duo-speaker-fix.service:/etc/systemd/system/zenbook-duo-speaker-fix.service:644"
)

tweak_post_install()
{
	systemctl daemon-reload
	systemctl enable zenbook-duo-speaker-fix.service
	systemctl start zenbook-duo-speaker-fix.service
	echo "  Speaker fix enabled and started."
}

tweak_post_uninstall()
{
	systemctl disable zenbook-duo-speaker-fix.service 2>/dev/null || true
	systemctl daemon-reload
	echo "  Speaker fix disabled."
}
