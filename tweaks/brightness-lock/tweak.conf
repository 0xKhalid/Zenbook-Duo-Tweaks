# Tweak: brightness-lock
# Keep lower built-in display (default eDP-2) at full brightness

TWEAK_NAME="brightness-lock"
TWEAK_DESCRIPTION="Keep lower built-in screen (eDP-2) at 100% brightness"

TWEAK_INFO="Keeps the lower built-in screen locked at full brightness.
Useful when KDE shows two built-in brightness sliders and top-screen
brightness changes also dim the lower panel.

Installs a script plus systemd service/timer:
  - zenbook-duo-brightness-lock.sh
  - zenbook-duo-brightness-lock.service
  - zenbook-duo-brightness-lock.timer

Default behavior:
  - Targets eDP-2
  - Re-applies full brightness every 3 seconds

Optional customization (edit service file):
  TARGET_OUTPUT=eDP-2
  TARGET_BRIGHTNESS=100
  DEBUG_LOG=0

Validate after install:
  systemctl status zenbook-duo-brightness-lock.timer
  systemctl status zenbook-duo-brightness-lock.service
  journalctl -u zenbook-duo-brightness-lock.service -n 30 --no-pager"

# Files: "source_filename:dest_absolute_path:permissions"
TWEAK_FILES=(
	"zenbook-duo-brightness-lock.sh:/usr/local/bin/zenbook-duo-brightness-lock.sh:755"
	"zenbook-duo-brightness-lock.service:/etc/systemd/system/zenbook-duo-brightness-lock.service:644"
	"zenbook-duo-brightness-lock.timer:/etc/systemd/system/zenbook-duo-brightness-lock.timer:644"
)

tweak_post_install()
{
	systemctl daemon-reload
	systemctl enable --now zenbook-duo-brightness-lock.timer
	systemctl start zenbook-duo-brightness-lock.service
	echo "  Enabled and started brightness lock timer."
}

tweak_post_uninstall()
{
	systemctl disable --now zenbook-duo-brightness-lock.timer 2>/dev/null || true
	systemctl stop zenbook-duo-brightness-lock.service 2>/dev/null || true
	systemctl daemon-reload
	echo "  Disabled brightness lock timer."
}
