# Tweak: heic-support
# Native HEIC/HEIF image codec support via RPM Fusion Free

TWEAK_NAME="heic-support"
TWEAK_DESCRIPTION="Native HEIC/HEIF image support (RPM Fusion Free)"

TWEAK_INFO="Enables native HEIC/HEIF image viewing across the desktop.

Installs from RPM Fusion Free repository:
  libheif-freeworld    - HEVC-enabled HEIF decoder (replaces
                         Fedora's patent-limited libheif)
  qt-heif-image-plugin - Qt plugin for HEIC in KDE apps

After install, HEIC images open natively in Gwenview,
Dolphin thumbnails, and other KDE/Qt apps.

Note: RPM Fusion Free is enabled if not already present.
Uninstall only removes packages installed by this tweak.

Validate after install:
  rpm -q libheif-freeworld qt-heif-image-plugin"

# Package-only tweak — no files to install
TWEAK_FILES=()

# Only the 2 essential packages needed for HEIC support
_HEIC_PKGS=(libheif-freeworld qt-heif-image-plugin)

_heic_state_file="${STATE_DIR}/heic-support.pkgs"

tweak_status_check()
{
	# If we have a state file, the tweak was installed by us
	if [[ -f "$_heic_state_file" ]]; then
		echo "installed"
		return
	fi

	# Otherwise check if packages happen to be installed externally
	local total=${#_HEIC_PKGS[@]}
	local installed=0

	for pkg in "${_HEIC_PKGS[@]}"; do
		if rpm -q "$pkg" &>/dev/null; then
			installed=$((installed + 1))
		fi
	done

	if [[ $installed -eq $total ]]; then
		echo "installed"
	elif [[ $installed -gt 0 ]]; then
		echo "partially installed"
	else
		echo "not installed"
	fi
}

tweak_pre_install()
{
	# Ensure RPM Fusion Free is enabled
	if ! rpm -q rpmfusion-free-release &>/dev/null; then
		echo "  Enabling RPM Fusion Free repository..."
		if dnf install -y "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm" >/dev/null 2>&1; then
			echo "  RPM Fusion Free enabled."
		else
			echo "  ERROR: Failed to enable RPM Fusion Free. Cannot continue."
			return 1
		fi
	else
		echo "  RPM Fusion Free already enabled."
	fi
	echo ""

	# Determine which packages are already installed (pre-existing)
	local pre_existing=()
	local to_install=()
	for pkg in "${_HEIC_PKGS[@]}"; do
		if rpm -q "$pkg" &>/dev/null; then
			pre_existing+=("$pkg")
		else
			to_install+=("$pkg")
		fi
	done

	if [[ ${#pre_existing[@]} -gt 0 ]]; then
		echo "  Already installed (will not be touched):"
		for pkg in "${pre_existing[@]}"; do
			echo "    - $pkg"
		done
		echo ""
	fi

	if [[ ${#to_install[@]} -eq 0 ]]; then
		echo "  All packages already present."
		mkdir -p "$STATE_DIR"
		: > "$_heic_state_file"
		return
	fi

	echo "  Installing HEIC codec packages..."
	if dnf install -y "${to_install[@]}" >/dev/null 2>&1; then
		echo "  Done."
	else
		echo "  WARNING: Package install reported errors. Some packages may not be available."
	fi

	# Record only the packages we actually installed (not pre-existing)
	mkdir -p "$STATE_DIR"
	local newly_installed=()
	for pkg in "${to_install[@]}"; do
		if rpm -q "$pkg" &>/dev/null; then
			newly_installed+=("$pkg")
		fi
	done
	printf '%s\n' "${newly_installed[@]}" > "$_heic_state_file"
}

tweak_pre_uninstall()
{
	if [[ ! -f "$_heic_state_file" ]]; then
		echo "  No state file found — nothing to remove."
		return
	fi

	local pkgs_to_remove=()
	while IFS= read -r pkg; do
		[[ -n "$pkg" ]] && pkgs_to_remove+=("$pkg")
	done < "$_heic_state_file"

	if [[ ${#pkgs_to_remove[@]} -eq 0 ]]; then
		echo "  All packages were pre-existing. Nothing to remove."
		rm -f "$_heic_state_file"
		return
	fi

	echo "  The following packages were installed by this tweak:"
	for pkg in "${pkgs_to_remove[@]}"; do
		echo "    - $pkg"
	done
	echo ""
	echo "  Pre-existing packages will NOT be removed."
	echo ""

	local answer
	read -rp "  Remove these packages? [y/N] " answer </dev/tty
	if [[ "${answer,,}" == "y" ]]; then
		dnf remove -y "${pkgs_to_remove[@]}" 2>/dev/null || true
		echo "  Packages removed."
	else
		echo "  Keeping packages."
	fi

	rm -f "$_heic_state_file"
}
