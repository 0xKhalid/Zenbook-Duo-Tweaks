# Tweak: whisper-dictate
# Live on-device voice-to-text transcription via local whisper.cpp

TWEAK_NAME="whisper-dictate"
TWEAK_DESCRIPTION="Live on-device voice-to-text transcription"

TWEAK_INFO="Live on-device voice-to-text transcription.
Press once to start recording, press again to stop, transcribe,
and auto-paste at cursor position. Fully local — no cloud APIs.
Non-speech token suppression is enabled when supported by your whisper.cpp build.
Recording auto-stops after 5 minutes by default.
Configurable via env var: WHISPER_MAX_RECORD_SECONDS (default: 300).
When the limit is reached, it auto-transcribes and pastes what was recorded.

Uses whisper.cpp for transcription (base.en model + Silero VAD).
Installs to ~/.local/share/whisper.cpp (~500MB after build).

Dependencies installed automatically:
  alsa-utils, ydotool, wl-clipboard, libnotify,
  cmake, gcc-c++, git, SDL2-devel

Key binding is up to you.
Example (my personal setup):
  I used input-remapper to map the Copilot key to F12,
  then bound F12 in KDE:
  1. Install input-remapper (dnf install input-remapper)
  2. Remap Copilot key → F12 (or pick any other key)
  3. System Settings → Shortcuts → Add New → Command/Script
     Command: whisper-dictate-toggle
     Trigger: your chosen key (F12 in the example)

ydotoold must be running (enabled automatically on install)."

# Files: "source_filename:dest_absolute_path:permissions"
TWEAK_FILES=(
	"whisper-dictate-toggle:/usr/local/bin/whisper-dictate-toggle:755"
)

tweak_pre_install()
{
	local target_user="${SUDO_USER:-}"
	if [[ -z "$target_user" ]]; then
		echo "  ERROR: Cannot determine user (SUDO_USER not set)."
		echo "  Run with: sudo ./zenbook-tweaks"
		return 1
	fi

	local target_home
	target_home=$(getent passwd "$target_user" | cut -d: -f6)

	# --- Install system packages ---
	local pkgs=(alsa-utils ydotool wl-clipboard libnotify cmake gcc-c++ git SDL2-devel)
	echo "  Installing system packages..."
	if dnf install -y "${pkgs[@]}" >/dev/null 2>&1; then
		echo "  Done."
	else
		echo "  WARNING: Package install reported errors. Continuing."
	fi
	echo ""

	# --- Enable ydotoold ---
	local ydotool_unit=""
	if systemctl cat ydotoold.service >/dev/null 2>&1; then
		ydotool_unit="ydotoold.service"
	elif systemctl cat ydotool.service >/dev/null 2>&1; then
		ydotool_unit="ydotool.service"
	fi

	if [[ -z "$ydotool_unit" ]]; then
		echo "  WARNING: No ydotool systemd service unit found. Continuing."
	elif ! systemctl is-active --quiet "$ydotool_unit" 2>/dev/null; then
		if systemctl enable --now "$ydotool_unit" >/dev/null 2>&1; then
			echo "  Enabled ${ydotool_unit}"
		else
			echo "  WARNING: Could not enable ${ydotool_unit}. Continuing."
		fi
	else
		echo "  ${ydotool_unit} already running"
	fi
	echo ""

	# --- Build whisper.cpp ---
	local whisper_dir="$target_home/.local/share/whisper.cpp"
	local whisper_bin="$whisper_dir/build/bin/whisper-cli"

	if [[ -x "$whisper_bin" ]]; then
		echo "  whisper.cpp already built at ${whisper_dir}"
	else
		echo "  whisper.cpp needs to be cloned and compiled."
		echo "  Location: ${whisper_dir}"
		echo "  Estimated: ~500MB disk, a few minutes to build."
		echo ""
		local answer
		read -rp "  Continue? [Y/n] " answer </dev/tty
		if [[ "${answer,,}" == "n" ]]; then
			echo "  Skipping whisper.cpp build. The script will not work without it."
			return 0
		fi

		echo ""
		echo "  Cloning whisper.cpp..."
		sudo -u "$target_user" git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git "$whisper_dir" 2>&1 || true

		echo "  Building whisper.cpp (this may take a few minutes)..."
		sudo -u "$target_user" cmake -S "$whisper_dir" -B "$whisper_dir/build" -DCMAKE_BUILD_TYPE=Release >/dev/null 2>&1
		sudo -u "$target_user" cmake --build "$whisper_dir/build" -j"$(nproc)" 2>&1

		if [[ ! -x "$whisper_bin" ]]; then
			echo "  ERROR: Build failed — whisper-cli not found at ${whisper_bin}"
			return 1
		fi
		echo "  Build complete."
	fi
	echo ""

	# --- Download models ---
	local models_dir="$whisper_dir/models"
	sudo -u "$target_user" mkdir -p "$models_dir"

	local base_model="$models_dir/ggml-base.en.bin"
	if [[ ! -f "$base_model" ]]; then
		echo "  Downloading base.en model..."
		sudo -u "$target_user" curl -L --progress-bar -o "$base_model" \
			"https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.en.bin"
	else
		echo "  base.en model already present"
	fi

	local vad_model="$models_dir/ggml-silero-v6.2.0.bin"
	if [[ ! -f "$vad_model" ]]; then
		echo "  Downloading Silero VAD model..."
		sudo -u "$target_user" curl -L --progress-bar -o "$vad_model" \
			"https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-silero-v6.2.0.bin"
	else
		echo "  Silero VAD model already present"
	fi
	echo ""
}

tweak_post_install()
{
	echo ""
	echo "  Key binding is up to you."
	echo "  Example (my personal setup): Copilot remapped to F12 with input-remapper."
	echo "  Then in KDE:"
	echo "    System Settings → Shortcuts → Add New → Command/Script"
	echo "    Command: whisper-dictate-toggle"
	echo "    Trigger: your chosen key (F12 in the example)"
}

tweak_pre_uninstall()
{
	local target_user="${SUDO_USER:-}"
	if [[ -z "$target_user" ]]; then
		return 0
	fi

	local target_home
	target_home=$(getent passwd "$target_user" | cut -d: -f6)
	local whisper_dir="$target_home/.local/share/whisper.cpp"

	if [[ -d "$whisper_dir" ]]; then
		echo ""
		echo "  whisper.cpp is installed at: ${whisper_dir}"
		local answer
		read -rp "  Also remove whisper.cpp and models? [y/N] " answer </dev/tty
		if [[ "${answer,,}" == "y" ]]; then
			rm -rf "$whisper_dir"
			echo "  Removed ${whisper_dir}"
		else
			echo "  Keeping ${whisper_dir}"
		fi
	fi
}

tweak_post_uninstall()
{
	echo "  Note: ydotoold.service left enabled (may be used by other tools)."
}
